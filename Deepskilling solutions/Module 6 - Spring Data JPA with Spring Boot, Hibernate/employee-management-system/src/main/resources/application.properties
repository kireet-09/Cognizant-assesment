# Spring Framework and application log

logging.level.root=INFO
logging.level.com.cognizant=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===== Exercise 1: Data Source Configuration with H2 =====
# Using in-memory H2 database for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable automatic SQL script loading to avoid conflicts
spring.sql.init.mode=never

# ===== Exercise 2: JPA/Hibernate Configuration =====
# Hibernate DDL Strategy - auto creates tables
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL statements in console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Exercise 9: Hibernate Dialect Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===== Exercise 10: Hibernate-Specific Features =====
# Batch Processing Configuration
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ===== JPA Configuration =====
spring.jpa.open-in-view=false

# ===== Entity Scanning =====
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ===== Auditing Configuration (Exercise 7) =====
spring.jpa.properties.hibernate.generate_statistics=false
