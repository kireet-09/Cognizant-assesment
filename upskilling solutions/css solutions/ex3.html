<!DOCTYPE html>
<html>
<head>
<title>Exercise 3</title>

<style>

/* Universal Selector */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Element Selector */
h2{
    color:green;
    margin-bottom:10px;
}

/* ID Selector */
#mainHeader{
    background:black;
    color:white;
    padding:20px;
    text-align:center;
}

/* Class Selector */
.eventCard{
    border:2px solid gray;
    margin:20px;
    padding:20px;
}

/* Group Selector */
h3,p{
    color:#444;
    font-family:Arial;
}

</style>

</head>
<body>

<div id="mainHeader">
    Local Community Event Portal
</div>

<div class="eventCard">

    <h2>Music Festival</h2>

    <h3>Venue</h3>

    <p>City Park</p>

</div>

</body>
</html>
