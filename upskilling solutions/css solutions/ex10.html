<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise 10</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
}

/* Navigation */

.navbar{

    display:flex;

    justify-content:center;

    gap:20px;

    background:#333;

    padding:15px;
}

.navbar a{
    color:white;
    text-decoration:none;
}

/* Content Section */

.container{

    width:80%;

    margin:auto;

    padding:20px;
}

img{

    width:50vw;

    height:auto;

    display:block;

    margin:auto;
}

h1{
    text-align:center;
    margin:20px;
}

/* Media Query */

@media screen and (max-width:768px){

    .navbar{
        flex-direction:column;
        align-items:center;
    }

    img{
        width:90%;
    }

    body{
        font-size:14px;
    }

    .container{
        width:95%;
    }

}

</style>

</head>
<body>

<nav class="navbar">

    <a href="#">Home</a>

    <a href="#">Events</a>

    <a href="#">Gallery</a>

    <a href="#">Contact</a>

</nav>

<div class="container">

    <h1>Local Community Event Portal</h1>

    <img src="https://picsum.photos/700/400"
         alt="Community Event">

    <p>
        This page demonstrates responsive design using CSS media queries.
        Resize the browser window to see navigation links stack vertically
        on smaller screens.
    </p>

</div>

</body>
</html>
