<div id="eventsContainer"></div>

<select id="categoryFilter">
    <option>Music</option>
    <option>Sports</option>
    <option>Food</option>
</select>

<input
type="text"
id="searchBox"
placeholder="Search Events">

<form id="registrationForm">

name="name"
placeholder="Name">

name="email"
placeholder="Email">

</select>

<button type="submit">
Register

</form>

<div id="formErrors"></div>

<div id="loading"
style="display:none;">

</div>
